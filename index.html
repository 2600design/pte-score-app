<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <base href="/">
  <title>PTE Exam Practice – AI Scoring</title>
  <link rel="stylesheet" href="styles.css?v=18">
</head>
<body>
  <!-- Mobile Header -->
  <div id="mobile-header">
    <button id="hamburger-btn" onclick="toggleDrawer()" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <rect y="3" width="20" height="2" rx="1"/><rect y="9" width="20" height="2" rx="1"/><rect y="15" width="20" height="2" rx="1"/>
      </svg>
    </button>
    <div class="mobile-header-actions">
      <div id="mobile-lang-slot"></div>
    </div>
  </div>
  <!-- Drawer Overlay -->
  <div id="drawer-overlay" onclick="closeDrawer()"></div>

  <div id="app">
    <!-- Sidebar / Mobile Drawer -->
    <aside id="sidebar">
      <div class="logo">
        <button class="logo-home" type="button" onclick="navigate('home')" aria-label="Go to home">
          <div class="sidebar-logo-img-wrap">
            <img src="/logo_transparent_final.png" alt="PTE score" class="sidebar-logo-img">
          </div>
          <span class="logo-text">PTE score</span>
        </button>
        <div id="auth-slot-desktop" class="auth-slot-desktop" style="display:none"></div>
        <button id="theme-toggle" class="theme-toggle-btn" onclick="toggleTheme()" title="切换主题"></button>
      </div>
      <nav id="sidebar-nav" style="flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;-ms-overflow-style:none"></nav>
    </aside>

    <!-- Main Content -->
    <main id="main">
      <div id="page-container"></div>
    </main>
  </div>

  <!-- Bottom Navigation (mobile only) -->
  <nav id="bottom-nav">
    <button class="bottom-tab active" data-section="home" onclick="navigate('home')">
      <div class="bottom-tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span class="bottom-tab-label" data-i18n="nav_home">首页</span>
    </button>
    <button class="bottom-tab" data-section="practice" onclick="navigate('practice')">
      <div class="bottom-tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
      </div>
      <span class="bottom-tab-label" data-i18n="nav_practice">练习</span>
    </button>
    <button class="bottom-tab" data-section="mock-test" onclick="navigate('mock-test')">
      <div class="bottom-tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <span class="bottom-tab-label" data-i18n="nav_mock_test">模考</span>
    </button>
    <button class="bottom-tab" data-section="account-settings" onclick="navigate('account-settings')">
      <div class="bottom-tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span class="bottom-tab-label" data-i18n="nav_account_settings">我的</span>
    </button>
  </nav>

  <script>const Pages = {};</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="data/questions.js?v=4"></script>
  <script src="data/prediction-bank.js?v=2"></script>
  <script src="data/di-templates.js?v=6"></script>
  <script src="js/utils.js?v=3"></script>

  <script src="js/lib/speaking-audio.js?v=1"></script>

  <script src="js/config/app-config.js?v=2"></script>
  <script src="js/config/supabase-config.js?v=1"></script>
  <script src="js/lib/supabase-client.js?v=3"></script>
  <script src="js/lib/progress.js?v=2"></script>
  <script src="js/lib/auth.js?v=2"></script>
  <script src="js/lib/recording-archive.js?v=2"></script>
  <script src="js/pages/home.js?v=8"></script>
  <script src="js/pages/practice.js?v=9"></script>

  <script src="js/pages/account.js?v=2"></script>
  <script src="js/pages/read-aloud.js?v=5"></script>
  <script src="js/pages/repeat-sentence.js?v=6"></script>

  <script src="js/pages/write-essay.js?v=4"></script>

  <script src="js/pages/progress.js?v=8"></script>

  <script src="js/pages/walkman.js?v=4"></script>
  <script src="js/ai-scorer.js?v=5"></script>
  <script src="app.js?v=19"></script>
</body>
