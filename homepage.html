<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PTE Practice – 首页</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }

:root {
  --navy:   #0f1d36;
  --navy-2: #162845;
  --navy-3: #1e3560;
  --accent: #3b82f6;
  --surface:#f8f9fc;
  --card:   #ffffff;
  --border: rgba(15,29,54,0.07);
  --text:   #0f1d36;
  --muted:  #64748b;
  --faint:  #c0c9d8;
  --r-sm: 10px; --r-md: 14px; --r-lg: 18px; --r-xl: 22px; --r-full: 9999px;
  --s-sm: 0 1px 3px rgba(15,29,54,.06), 0 1px 2px rgba(15,29,54,.04);
  --s-md: 0 4px 16px rgba(15,29,54,.08);
  --font: "Inter", -apple-system, sans-serif;
}

body {
  font-family: var(--font);
  background: var(--surface);
  color: var(--text);
  max-width: 430px;
  margin: 0 auto;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* TOP NAV */
.top-nav {
  background: var(--navy);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.nav-hamburger { background: none; border: none; color: rgba(255,255,255,.7); cursor: pointer; display: flex; }
.nav-brand { color: #fff; font-size: 16px; font-weight: 700; letter-spacing: .4px; }
.nav-avatar {
  width: 34px; height: 34px; border-radius: var(--r-full);
  background: var(--accent); color: #fff;
  font-size: 14px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: none; cursor: pointer;
}

/* HERO */
.hero {
  background: linear-gradient(145deg, var(--navy) 0%, var(--navy-3) 100%);
  padding: 24px 20px 32px;
  position: relative; overflow: hidden;
}
.hero-deco {
  position: absolute; border-radius: var(--r-full);
  background: rgba(59,130,246,.12); pointer-events: none;
}
.hero-deco-1 { width: 200px; height: 200px; right: -60px; top: -60px; }
.hero-deco-2 { width: 120px; height: 120px; right: 40px; bottom: -40px; background: rgba(59,130,246,.07); }
.hero-greeting { color: rgba(255,255,255,.6); font-size: 13px; font-weight: 500; margin-bottom: 4px; position: relative; z-index: 1; }
.hero-title { color: #fff; font-size: 22px; font-weight: 800; margin-bottom: 20px; position: relative; z-index: 1; line-height: 1.2; }
.hero-title span { color: #93c5fd; }
.stats-row { display: flex; gap: 10px; position: relative; z-index: 1; }
.stat-pill {
  flex: 1;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: var(--r-md);
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 2px;
}
.stat-pill-val { color: #fff; font-size: 20px; font-weight: 800; line-height: 1; }
.stat-pill-val.accent { color: #93c5fd; }
.stat-pill-label { color: rgba(255,255,255,.55); font-size: 11px; font-weight: 500; }

/* TODAY TASK STRIP */
.task-strip {
  margin: -1px 16px 0;
  background: var(--card);
  border-radius: var(--r-xl);
  padding: 16px 18px;
  box-shadow: var(--s-md);
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 10;
  border: 1px solid var(--border);
}
.task-left { display: flex; flex-direction: column; gap: 3px; }
.task-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.task-name { font-size: 15px; font-weight: 700; }
.task-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
.task-btn {
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--r-full);
  padding: 10px 18px; font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  box-shadow: 0 4px 12px rgba(59,130,246,.35);
  transition: background .2s, transform .15s;
  flex-shrink: 0;
}
.task-btn:hover { background: #2563eb; }
.task-btn:active { transform: scale(.97); }

/* CONTENT */
.content { padding: 24px 16px 100px; display: flex; flex-direction: column; gap: 24px; }
.section-label {
  font-size: 13px; font-weight: 700; color: var(--text);
  margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.section-label a { font-size: 12px; font-weight: 500; color: var(--accent); text-decoration: none; }

/* SKILLS GRID */
.skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.skill-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px 14px 14px;
  display: flex; flex-direction: column; gap: 8px;
  box-shadow: var(--s-sm);
  cursor: pointer;
  transition: box-shadow .2s, transform .15s;
  position: relative; overflow: hidden;
}
.skill-card:hover { box-shadow: var(--s-md); transform: translateY(-1px); }
.skill-card:active { transform: scale(.98); }
.skill-card-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; }
.skill-icon-wrap {
  width: 36px; height: 36px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
}
.skill-name { font-size: 14px; font-weight: 700; }
.skill-count { font-size: 11px; color: var(--muted); }
.skill-tags { font-size: 10px; color: var(--faint); font-weight: 500; line-height: 1.4; margin-top: 2px; }
.skill-arrow { position: absolute; right: 12px; bottom: 14px; color: var(--faint); font-size: 14px; }

/* QUICK ACCESS */
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.quick-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 14px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--s-sm);
  cursor: pointer;
  transition: box-shadow .2s, transform .15s;
}
.quick-card:hover { box-shadow: var(--s-md); }
.quick-card:active { transform: scale(.98); }
.quick-icon {
  width: 38px; height: 38px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.quick-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.quick-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.quick-sub { font-size: 11px; color: var(--muted); }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(15,29,54,0.07);
  display: flex; padding: 8px 0;
  padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
  z-index: 200;
  box-shadow: 0 -4px 20px rgba(15,29,54,.06);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 2px; font-size: 10px; font-weight: 500;
  color: #b0bdd0; border: none; background: none; cursor: pointer; padding: 2px 0;
  -webkit-tap-highlight-color: transparent; transition: color .18s;
}
.nav-item svg { width: 22px; height: 22px; }
.nav-item-icon {
  width: 44px; height: 28px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background .18s;
}
.nav-item.active .nav-item-icon { background: rgba(15,29,54,.09); }
.nav-item.active { color: var(--navy); font-weight: 600; }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="top-nav">
